<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080b12">
    <link rel="manifest" href="/manifest.json">
    <title>OSCAR Companion</title>
    <style>
        :root {
            --bg: #080b12;
            --card: #0f1923;
            --elevated: #152233;
            --text: #e8edf4;
            --dim: #7a8896;
            --accent: #1d4280;
            --yellow: #f0b800;
            --border: #1a2d44;
            --green: #4ade80;
            --red: #f87171;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, rgba(15,25,35,0.98), rgba(15,25,35,0.9));
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-brand { font-weight: 800; font-size: 1.1rem; color: var(--yellow); }
        .header-brand span { color: var(--dim); font-weight: 400; font-size: 0.7rem; margin-left: 6px; }
        .conn-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
        }
        .conn-badge.connected { background: rgba(74,222,128,0.15); color: var(--green); }
        .conn-badge.disconnected { background: rgba(248,113,113,0.15); color: var(--red); }
        .conn-dot { width: 7px; height: 7px; border-radius: 50%; }
        .conn-badge.connected .conn-dot { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.5); }
        .conn-badge.disconnected .conn-dot { background: var(--red); }

        /* Overload Banner */
        .overload-banner {
            background: rgba(239,68,68,0.2);
            border-bottom: 2px solid #ef4444;
            color: white;
            padding: 12px 16px;
            text-align: center;
            font-weight: 800;
            font-size: 0.9rem;
            animation: flash 0.6s infinite;
        }
        @keyframes flash {
            0%, 100% { background: rgba(239,68,68,0.2); }
            50% { background: rgba(239,68,68,0.45); }
        }

        /* Total Load Hero */
        .hero {
            text-align: center;
            padding: 28px 16px 20px;
        }
        .hero-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .hero-value { font-size: 3.2rem; font-weight: 900; color: var(--text); line-height: 1; margin: 6px 0; font-variant-numeric: tabular-nums; }
        .hero-unit { font-size: 0.8rem; color: var(--dim); font-weight: 500; }
        .hero-conversions { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 0.75rem; color: var(--dim); }

        /* Session bar */
        .session-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            font-size: 0.78rem;
            color: var(--dim);
        }
        .session-bar.recording { color: var(--green); }
        .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Cell Grid */
        .cells { padding: 0 12px 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
        .cell {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            transition: border-color 0.2s;
        }
        .cell.overload { border-color: #ef4444; animation: flash 0.6s infinite; }
        .cell-tag { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .cell-value { font-size: 1.8rem; font-weight: 800; margin: 4px 0 2px; font-variant-numeric: tabular-nums; }
        .cell-unit { font-size: 0.7rem; color: var(--dim); }
        .cell-peak { font-size: 0.68rem; color: var(--yellow); margin-top: 4px; }
        .cell-signal { display: flex; align-items: center; gap: 4px; font-size: 0.62rem; color: var(--dim); margin-top: 4px; }
        .sig-dot { width: 6px; height: 6px; border-radius: 50%; }
        .sig-dot.live { background: var(--green); }
        .sig-dot.heartbeat { background: #fbbf24; }
        .sig-dot.stale { background: var(--red); }

        /* Stats */
        .stats { padding: 0 12px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
        }
        .stat-label { font-size: 0.62rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        .stat-value { font-size: 1.1rem; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
        .stat-value.yellow { color: var(--yellow); }

        /* Tabs */
        .tabs {
            display: flex;
            border-top: 1px solid var(--border);
            background: var(--card);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding-bottom: var(--safe-bottom);
            z-index: 100;
        }
        .tab {
            flex: 1;
            padding: 10px 0 8px;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--dim);
            border: none;
            background: none;
            cursor: pointer;
        }
        .tab.active { color: var(--yellow); }
        .tab-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }

        /* Camera tab */
        .camera-section { padding: 16px; }
        .camera-section h3 { font-size: 0.9rem; margin-bottom: 12px; }
        .camera-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px dashed var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .camera-btn:active { background: var(--elevated); }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; }
        .photo-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
        .gps-info { font-size: 0.72rem; color: var(--dim); margin-top: 8px; text-align: center; }

        /* Leaks tab */
        .leaks-section { padding: 16px; }
        .leaks-section h3 { font-size: 0.9rem; margin-bottom: 12px; }
        .leak-log-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--red);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .leak-log-btn:active { opacity: 0.8; }
        .leak-list { display: flex; flex-direction: column; gap: 10px; }
        .leak-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            gap: 10px;
            padding: 10px;
        }
        .leak-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .leak-body { flex: 1; min-width: 0; }
        .leak-desc { font-size: 0.85rem; color: var(--text); line-height: 1.3; margin-bottom: 6px; word-wrap: break-word; }
        .leak-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 0.7rem; color: var(--dim); }
        .severity-badge {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .severity-badge.minor { background: rgba(74,222,128,0.15); color: var(--green); }
        .severity-badge.moderate { background: rgba(240,184,0,0.15); color: var(--yellow); }
        .severity-badge.severe { background: rgba(248,113,113,0.2); color: var(--red); }
        .leak-delete {
            background: none;
            border: none;
            color: var(--dim);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
        }
        .leak-delete:active { color: var(--red); }
        .leak-empty { text-align: center; color: var(--dim); padding: 30px 16px; font-size: 0.85rem; }
        .leak-form { display: flex; flex-direction: column; gap: 12px; }
        .leak-form-field { display: flex; flex-direction: column; gap: 6px; }
        .leak-form-label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        .leak-form textarea,
        .leak-form input[type="text"] {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 10px 12px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .leak-form textarea { resize: vertical; min-height: 80px; }
        .leak-form input[type="text"] { min-height: 0; }
        .leak-form textarea:focus,
        .leak-form input:focus { outline: none; border-color: var(--yellow); }
        .severity-choices { display: flex; gap: 8px; }
        .severity-choice {
            flex: 1;
            padding: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }
        .severity-choice.selected.minor { background: rgba(74,222,128,0.15); border-color: var(--green); color: var(--green); }
        .severity-choice.selected.moderate { background: rgba(240,184,0,0.15); border-color: var(--yellow); color: var(--yellow); }
        .severity-choice.selected.severe { background: rgba(248,113,113,0.2); border-color: var(--red); color: var(--red); }
        .leak-photo-preview {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .leak-photo-placeholder {
            width: 100%;
            aspect-ratio: 4/3;
            border: 2px dashed var(--border);
            border-radius: 10px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dim);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .leak-form-actions { display: flex; gap: 8px; margin-top: 8px; }
        .leak-form-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }
        .leak-submit { background: var(--red); color: #fff; }
        .leak-submit:disabled { background: var(--elevated); color: var(--dim); cursor: not-allowed; }
        .leak-cancel { background: var(--card); color: var(--text); border: 1px solid var(--border) !important; }

        /* Equipment tab */
        .equipment-section { padding: 16px; }
        .equipment-section h3 { font-size: 0.9rem; margin-bottom: 12px; }
        .equip-list { display: flex; flex-direction: column; gap: 8px; }
        .equip-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
        }
        .equip-item-name { font-weight: 700; font-size: 0.85rem; }
        .equip-item-meta { font-size: 0.72rem; color: var(--dim); margin-top: 2px; }
        .equip-item-certs { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
        .equip-cert-link {
            display: inline-block;
            font-size: 0.72rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--accent, #2563eb);
            color: white;
            text-decoration: none;
        }
        .equip-no-certs { font-size: 0.7rem; color: var(--dim); font-style: italic; }
        .equip-empty { text-align: center; color: var(--dim); padding: 40px 16px; font-size: 0.85rem; }

        /* Content area padding for fixed bottom tabs */
        .content { padding-bottom: 70px; }

        /* Connecting screen */
        .connecting { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 20px; }
        .connecting h2 { font-size: 1.1rem; margin-bottom: 8px; }
        .connecting p { font-size: 0.82rem; color: var(--dim); }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    (function() {
        'use strict';

        // ── State ──
        let state = {
            connected: false,
            wsConnected: false,
            devices: {},
            selectedTags: [],
            cellCount: 1,
            isLogging: false,
            sessionName: '',
            loggedSamples: 0,
            peakValues: {},
            totalLoad: 0,
            wllThreshold: 0,
            overloadTags: [],
            deviceStatus: 'disconnected',
            activeTab: 'live',
            photos: [],
            gps: null,
            equipmentItems: [],
            leaks: [],
            leakDraft: null,
            leakSubmitting: false
        };

        let ws = null;
        let lastPacketTimes = {};
        let reconnectTimer = null;

        // ── WebSocket Connection ──
        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${proto}//${location.host}`;

            try {
                ws = new WebSocket(url);
            } catch (e) {
                scheduleReconnect();
                return;
            }

            ws.onopen = () => {
                state.wsConnected = true;
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
                render();
                // Fetch initial state
                fetch('/api/state').then(r => r.json()).then(s => {
                    Object.assign(state, s);
                    state.wsConnected = true;
                    render();
                }).catch(() => {});
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {}
            };

            ws.onclose = () => {
                state.wsConnected = false;
                render();
                scheduleReconnect();
            };

            ws.onerror = () => {
                state.wsConnected = false;
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connectWS();
            }, 3000);
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'liveData':
                    state.devices[msg.data.tag] = msg.data;
                    lastPacketTimes[msg.data.tag] = Date.now();
                    recalcTotal();
                    if (!state.leakDraft) render();
                    break;
                case 'overload':
                    state.overloadTags = msg.data.tags || [];
                    state.wllThreshold = msg.data.wllThreshold || 0;
                    // Vibrate phone on overload!
                    if (state.overloadTags.length > 0 && navigator.vibrate) {
                        navigator.vibrate([200, 100, 200, 100, 400]);
                    }
                    render();
                    break;
                case 'state':
                    Object.assign(state, msg.data);
                    render();
                    break;
                case 'leak':
                    if (!(state.leaks || []).some(l => l.id === msg.data.id)) {
                        state.leaks = [...(state.leaks || []), msg.data];
                        if (!state.leakDraft) render();
                    }
                    break;
                case 'leakDeleted':
                    state.leaks = (state.leaks || []).filter(l => l.id !== msg.data.id);
                    if (!state.leakDraft) render();
                    break;
                case 'leaksCleared':
                    state.leaks = [];
                    if (!state.leakDraft) render();
                    break;
            }
        }

        function recalcTotal() {
            let total = 0;
            (state.selectedTags || []).forEach(tag => {
                if (tag && state.devices[tag]) total += state.devices[tag].value;
            });
            state.totalLoad = total;
        }

        // ── GPS ──
        function getGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                (pos) => { state.gps = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }; },
                () => {},
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // ── Photo Capture ──
        function capturePhoto() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const dataUrl = ev.target.result;
                    // Send to OSCAR
                    fetch('/api/photo', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ dataUrl, timestamp: Date.now(), gps: state.gps })
                    }).then(r => r.json()).then(() => {
                        state.photos.push({ dataUrl, timestamp: Date.now(), gps: state.gps });
                        render();
                    }).catch(() => {});
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // ── Leak Reporting ──
        function startLeakDraft() {
            state.leakDraft = { dataUrl: null, description: '', severity: 'minor', serial: '' };
            render();
        }

        function cancelLeakDraft() {
            state.leakDraft = null;
            render();
        }

        function captureLeakPhoto() {
            if (!state.leakDraft) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    if (!state.leakDraft) return;
                    state.leakDraft.dataUrl = ev.target.result;
                    render();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function setLeakSeverity(sev) {
            if (!state.leakDraft) return;
            state.leakDraft.severity = sev;
            render();
        }

        function setLeakDescription(value) {
            if (!state.leakDraft) return;
            state.leakDraft.description = value;
            updateLeakSubmitState();
        }

        function setLeakSerial(value) {
            if (!state.leakDraft) return;
            state.leakDraft.serial = value;
        }

        function updateLeakSubmitState() {
            const btn = document.querySelector('.leak-submit');
            if (!btn) return;
            const d = state.leakDraft;
            const canSubmit = !!(d && d.dataUrl && d.description.trim().length > 0 && !state.leakSubmitting);
            btn.disabled = !canSubmit;
        }

        function submitLeak() {
            const draft = state.leakDraft;
            if (!draft || !draft.dataUrl || !draft.description.trim()) return;
            state.leakSubmitting = true;
            render();
            fetch('/api/leak', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dataUrl: draft.dataUrl,
                    description: draft.description.trim(),
                    severity: draft.severity,
                    serial: (draft.serial || '').trim(),
                    timestamp: Date.now(),
                    gps: state.gps
                })
            })
            .then(r => r.json())
            .then(resp => {
                state.leakSubmitting = false;
                state.leakDraft = null;
                // The leak will arrive via WS broadcast, but ensure it's here in case WS is slow
                if (resp && resp.leak && !(state.leaks || []).some(l => l.id === resp.leak.id)) {
                    state.leaks = [...(state.leaks || []), resp.leak];
                }
                render();
            })
            .catch(() => {
                state.leakSubmitting = false;
                render();
                alert('Failed to submit leak. Check connection and try again.');
            });
        }

        function deleteLeak(id) {
            if (!confirm('Delete this leak report?')) return;
            fetch('/api/leaks/' + encodeURIComponent(id), { method: 'DELETE' })
                .catch(() => {});
            // Optimistic update — broadcast will also sync
            state.leaks = (state.leaks || []).filter(l => l.id !== id);
            render();
        }

        // ── Signal Helpers ──
        function getSignal(tag) {
            if (!tag || !lastPacketTimes[tag]) return 'stale';
            const elapsed = Date.now() - lastPacketTimes[tag];
            if (elapsed < 2000) return 'live';
            if (elapsed < 5000) return 'heartbeat';
            return 'stale';
        }

        function getSignalLabel(tag) {
            if (!tag || !lastPacketTimes[tag]) return 'No signal';
            const elapsed = Date.now() - lastPacketTimes[tag];
            if (elapsed < 2000) return 'Live';
            return Math.floor(elapsed / 1000) + 's ago';
        }

        // ── Format ──
        function fmt(v, dec) { return (v || 0).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec }); }

        // ── Render ──
        function render() {
            const app = document.getElementById('app');
            if (!state.wsConnected) {
                app.innerHTML = renderConnecting();
                return;
            }

            // Preserve focus state for inputs that may be replaced
            const activeEl = document.activeElement;
            const preservedId = activeEl && activeEl.id ? activeEl.id : null;
            const preservedStart = preservedId && typeof activeEl.selectionStart === 'number' ? activeEl.selectionStart : null;
            const preservedEnd = preservedId && typeof activeEl.selectionEnd === 'number' ? activeEl.selectionEnd : null;

            let html = renderHeader();

            if (state.overloadTags && state.overloadTags.length > 0) {
                html += `<div class="overload-banner">OVERLOAD WARNING — ${state.overloadTags.map(t => 'Cell ' + t).join(', ')}</div>`;
            }

            html += '<div class="content">';

            if (state.activeTab === 'live') {
                html += renderLiveTab();
            } else if (state.activeTab === 'camera') {
                html += renderCameraTab();
            } else if (state.activeTab === 'leaks') {
                html += renderLeaksTab();
            } else if (state.activeTab === 'equipment') {
                html += renderEquipmentTab();
            }

            html += '</div>';
            html += renderTabs();

            app.innerHTML = html;

            // Restore focus + cursor after DOM rebuild
            if (preservedId) {
                const restored = document.getElementById(preservedId);
                if (restored) {
                    restored.focus();
                    if (preservedStart !== null) {
                        try { restored.setSelectionRange(preservedStart, preservedEnd); } catch (e) {}
                    }
                }
            }

            // Bind events after render
            bindEvents();
        }

        function renderConnecting() {
            return `
                <div class="connecting">
                    <div class="spinner"></div>
                    <h2>Connecting to OSCAR...</h2>
                    <p>Make sure your phone is on the same WiFi network as the OSCAR laptop.</p>
                </div>
            `;
        }

        function renderHeader() {
            const dongleClass = state.deviceStatus === 'connected' ? 'connected' : 'disconnected';
            const dongleLabel = state.deviceStatus === 'connected' ? 'Dongle Connected' : 'Dongle Disconnected';
            return `
                <div class="header">
                    <div class="header-brand">OSCAR<span>Companion</span></div>
                    <div class="conn-badge ${dongleClass}"><span class="conn-dot"></span>${dongleLabel}</div>
                </div>
            `;
        }

        function renderLiveTab() {
            const total = state.totalLoad || 0;
            const shortTons = total / 2000;
            const metricTons = total * 0.00045359237;
            const activeTags = (state.selectedTags || []).slice(0, state.cellCount || 1).filter(t => t);

            let html = `
                <div class="hero">
                    <div class="hero-label">Total Load</div>
                    <div class="hero-value">${fmt(total, 1)}</div>
                    <div class="hero-unit">Pounds (lbs)</div>
                    <div class="hero-conversions">
                        <span>${fmt(shortTons, 3)} short tons</span>
                        <span>${fmt(metricTons, 3)} metric tons</span>
                    </div>
                </div>
            `;

            // Session info
            if (state.isLogging) {
                html += `<div class="session-bar recording"><span class="pulse"></span>Recording: ${state.loggedSamples || 0} samples${state.sessionName ? ' | ' + state.sessionName : ''}</div>`;
            } else {
                html += `<div class="session-bar">Not Recording</div>`;
            }

            // Cell cards
            if (activeTags.length > 0) {
                html += '<div class="cells">';
                activeTags.forEach((tag, i) => {
                    const pkt = state.devices[tag];
                    const val = pkt ? pkt.value : 0;
                    const isOverload = (state.overloadTags || []).includes(tag);
                    const sig = getSignal(tag);
                    const sigLabel = getSignalLabel(tag);
                    const peak = state.peakValues ? state.peakValues[tag] : null;

                    html += `
                        <div class="cell ${isOverload ? 'overload' : ''}">
                            <div class="cell-tag">Cell ${i + 1} &middot; ${tag}</div>
                            <div class="cell-value">${fmt(val, 1)}</div>
                            <div class="cell-unit">lbs</div>
                            ${peak ? `<div class="cell-peak">Peak: ${fmt(Math.abs(peak), 1)} lbs</div>` : ''}
                            <div class="cell-signal"><span class="sig-dot ${sig}"></span>${sigLabel}</div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Stats
            const peakTotal = state.peakValues ? Object.values(state.peakValues).reduce((a, v) => a + Math.abs(v || 0), 0) : 0;
            html += `
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Short Tons</div>
                        <div class="stat-value">${fmt(shortTons, 3)}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Metric Tons</div>
                        <div class="stat-value">${fmt(metricTons, 3)}</div>
                    </div>
                    ${state.isLogging && peakTotal > 0 ? `
                    <div class="stat">
                        <div class="stat-label">Peak Total</div>
                        <div class="stat-value yellow">${fmt(peakTotal, 1)} lbs</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Samples</div>
                        <div class="stat-value">${state.loggedSamples || 0}</div>
                    </div>
                    ` : ''}
                </div>
            `;

            return html;
        }

        function renderCameraTab() {
            let html = `
                <div class="camera-section">
                    <h3>Site Photos</h3>
                    <p style="font-size:0.78rem;color:var(--dim);margin-bottom:12px;">Take photos that will be sent to OSCAR and attached to the current session.</p>
                    <button class="camera-btn" onclick="window.__capturePhoto()">
                        <span style="font-size:1.4rem;">&#128247;</span> Take Photo
                    </button>
                    ${state.gps ? `<div class="gps-info">GPS: ${state.gps.lat.toFixed(5)}, ${state.gps.lng.toFixed(5)} (${Math.round(state.gps.accuracy)}m accuracy)</div>` : '<div class="gps-info">Acquiring GPS...</div>'}
                    <div class="photo-grid">
                        ${state.photos.map(p => `<img src="${p.dataUrl}" class="photo-thumb" />`).join('')}
                    </div>
                </div>
            `;
            return html;
        }

        function renderLeaksTab() {
            if (state.leakDraft) return renderLeakForm();

            const leaks = state.leaks || [];
            let html = `
                <div class="leaks-section">
                    <h3>Waterbag Leaks</h3>
                    <p style="font-size:0.78rem;color:var(--dim);margin-bottom:12px;">Log any leaks found during the job. Reports are sent to OSCAR for follow-up after the job.</p>
                    <button class="leak-log-btn" onclick="window.__startLeakDraft()">
                        <span style="font-size:1.3rem;">&#128167;</span> Log New Leak
                    </button>
            `;

            if (leaks.length === 0) {
                html += `<div class="leak-empty">No leaks logged yet.</div>`;
            } else {
                html += '<div class="leak-list">';
                leaks.slice().reverse().forEach(leak => {
                    const sev = leak.severity || 'minor';
                    const sevLabel = sev.charAt(0).toUpperCase() + sev.slice(1);
                    const when = new Date(leak.timestamp).toLocaleString(undefined, {
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    html += `
                        <div class="leak-item">
                            <img src="${leak.dataUrl}" class="leak-thumb" />
                            <div class="leak-body">
                                ${leak.serial ? `<div style="font-size:0.72rem;color:var(--yellow);font-weight:700;margin-bottom:4px;">S/N: ${escapeHtml(leak.serial)}</div>` : ''}
                                <div class="leak-desc">${escapeHtml(leak.description || '')}</div>
                                <div class="leak-meta">
                                    <span class="severity-badge ${sev}">${sevLabel}</span>
                                    <span>${when}</span>
                                    ${leak.gps ? `<span>&#128205; ${leak.gps.lat.toFixed(4)}, ${leak.gps.lng.toFixed(4)}</span>` : ''}
                                </div>
                            </div>
                            <button class="leak-delete" onclick="window.__deleteLeak('${leak.id}')" title="Delete">&times;</button>
                        </div>
                    `;
                });
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function renderLeakForm() {
            const draft = state.leakDraft;
            const canSubmit = draft.dataUrl && draft.description.trim().length > 0 && !state.leakSubmitting;
            return `
                <div class="leaks-section">
                    <h3>Log Leak</h3>
                    <div class="leak-form">
                        <div class="leak-form-field">
                            <div class="leak-form-label">Photo</div>
                            ${draft.dataUrl
                                ? `<img src="${draft.dataUrl}" class="leak-photo-preview" onclick="window.__captureLeakPhoto()" />`
                                : `<div class="leak-photo-placeholder" onclick="window.__captureLeakPhoto()">&#128247; Tap to take photo</div>`}
                        </div>
                        <div class="leak-form-field">
                            <div class="leak-form-label">Waterbag Serial #</div>
                            <input id="leak-serial-input" type="text" placeholder="e.g. WB-12345" oninput="window.__setLeakSerial(this.value)" value="${escapeHtml(draft.serial || '')}" />
                        </div>
                        <div class="leak-form-field">
                            <div class="leak-form-label">Description</div>
                            <textarea id="leak-desc-input" placeholder="Where is the leak? How bad is it?" oninput="window.__setLeakDescription(this.value)">${escapeHtml(draft.description || '')}</textarea>
                        </div>
                        <div class="leak-form-field">
                            <div class="leak-form-label">Severity</div>
                            <div class="severity-choices">
                                <div class="severity-choice minor ${draft.severity === 'minor' ? 'selected' : ''}" onclick="window.__setLeakSeverity('minor')">Minor</div>
                                <div class="severity-choice moderate ${draft.severity === 'moderate' ? 'selected' : ''}" onclick="window.__setLeakSeverity('moderate')">Moderate</div>
                                <div class="severity-choice severe ${draft.severity === 'severe' ? 'selected' : ''}" onclick="window.__setLeakSeverity('severe')">Severe</div>
                            </div>
                        </div>
                        <div class="leak-form-actions">
                            <button class="leak-cancel" onclick="window.__cancelLeakDraft()" ${state.leakSubmitting ? 'disabled' : ''}>Cancel</button>
                            <button class="leak-submit" onclick="window.__submitLeak()" ${canSubmit ? '' : 'disabled'}>${state.leakSubmitting ? 'Submitting…' : 'Submit Leak'}</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function renderEquipmentTab() {
            let html = `<div class="equipment-section"><h3>Job Equipment</h3>`;
            if (state.equipmentItems && state.equipmentItems.length > 0) {
                html += '<div class="equip-list">';
                state.equipmentItems.forEach(item => {
                    const name = item.description || item.name || 'Unknown';
                    const serial = item.serialNumber || item.serial || '';
                    const meta = [
                        serial ? 'S/N: ' + escapeHtml(serial) : '',
                        item.wll ? 'WLL: ' + escapeHtml(item.wll) : '',
                        item.quantity ? 'Qty: ' + escapeHtml(item.quantity) : ''
                    ].filter(Boolean).join(' | ');
                    let certsHtml = '';
                    if (item.certificates && item.certificates.length > 0) {
                        certsHtml = '<div class="equip-item-certs">' +
                            item.certificates.map(c =>
                                `<a class="equip-cert-link" href="${escapeHtml(c.url)}" target="_blank" rel="noopener">${escapeHtml(c.name)}</a>`
                            ).join('') +
                        '</div>';
                    } else {
                        certsHtml = '<div class="equip-item-certs equip-no-certs">No certificates on file</div>';
                    }
                    html += `
                        <div class="equip-item">
                            <div class="equip-item-name">${escapeHtml(name)}</div>
                            <div class="equip-item-meta">${meta}</div>
                            ${certsHtml}
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                html += '<div class="equip-empty">No equipment items loaded. Equipment data will appear here when a job with certificates is selected in OSCAR.</div>';
            }
            html += '</div>';
            return html;
        }

        function renderTabs() {
            return `
                <div class="tabs">
                    <button class="tab ${state.activeTab === 'live' ? 'active' : ''}" data-tab="live">
                        <span class="tab-icon">&#128200;</span>Live
                    </button>
                    <button class="tab ${state.activeTab === 'camera' ? 'active' : ''}" data-tab="camera">
                        <span class="tab-icon">&#128247;</span>Camera
                    </button>
                    <button class="tab ${state.activeTab === 'leaks' ? 'active' : ''}" data-tab="leaks">
                        <span class="tab-icon">&#128167;</span>Leaks
                    </button>
                    <button class="tab ${state.activeTab === 'equipment' ? 'active' : ''}" data-tab="equipment">
                        <span class="tab-icon">&#128218;</span>Equipment
                    </button>
                </div>
            `;
        }

        function bindEvents() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.onclick = () => {
                    state.activeTab = tab.dataset.tab;
                    render();
                };
            });
        }

        // Expose for onclick
        window.__capturePhoto = capturePhoto;
        window.__startLeakDraft = startLeakDraft;
        window.__cancelLeakDraft = cancelLeakDraft;
        window.__captureLeakPhoto = captureLeakPhoto;
        window.__setLeakSeverity = setLeakSeverity;
        window.__setLeakDescription = setLeakDescription;
        window.__setLeakSerial = setLeakSerial;
        window.__submitLeak = submitLeak;
        window.__deleteLeak = deleteLeak;

        // ── Init ──
        getGPS();
        setInterval(getGPS, 30000); // Refresh GPS every 30s
        setInterval(() => { if (state.wsConnected && !state.leakDraft) render(); }, 1000); // Refresh signal indicators
        connectWS();
        render();

    })();
    </script>
</body>
</html>
